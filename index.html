<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cards de Frutas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1 class="titulo">🍎 Alimentação Saudável</h1>

<div class="container">

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?apple" alt="Maçã">
        <h2>Maçã</h2>
        <p>52 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?banana" alt="Banana">
        <h2>Banana</h2>
        <p>89 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?orange" alt="Laranja">
        <h2>Laranja</h2>
        <p>47 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?strawberry" alt="Morango">
        <h2>Morango</h2>
        <p>32 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?pineapple" alt="Abacaxi">
        <h2>Abacaxi</h2>
        <p>50 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?watermelon" alt="Melancia">
        <h2>Melancia</h2>
        <p>30 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?grape" alt="Uva">
        <h2>Uva</h2>
        <p>69 kcal</p>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/200x200/?mango" alt="Manga">
        <h2>Manga</h2>
        <p>60 kcal</p>
    </div>

    <!-- Card motivacional -->
    <div class="card destaque">
        <h2>💪 Cuide do seu corpo</h2>
        <p>Uma alimentação saudável é o primeiro passo para uma vida melhor!</p>
    </div>

</div>

</body>
</html>
